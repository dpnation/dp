<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dpnation</title>
  <meta name="description" content="it's more than a look, it's a lifestyle">
  <meta property="og:title" content="dpnation">
  <meta property="og:description" content="it's more than a look, it's a lifestyle">
  <meta property="og:url" content="https://dpnation.com">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:   #0D0D0D;
      --spark: #FF8C69;
      --white: #FFFFFF;
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background: var(--ink);
      color: var(--white);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 42%;
      min-height: calc(100dvh - 52px);
    }

    /* ── Content panel ── */
    .content {
      display: grid;
      place-items: start center;
      align-content: center;
      padding: 4rem 3.5rem 4rem 4rem;
      position: relative;
    }

    .content::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 10% 80%, rgba(255,140,105,.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 420px;
      max-width: 100%;
      filter: invert(1);
      margin-bottom: 2.5rem;
      opacity: .9;
    }

    .tagline {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 1.25rem;
    }

    .tagline em {
      color: var(--spark);
      font-style: normal;
    }

    .bio {
      font-size: .63rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.28);
      line-height: 2.2;
      margin-bottom: 2.75rem;
    }

    /* ── Links ── */
    .links {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .63rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: .55rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.45);
      transition: border-color .2s, color .2s;
    }

    .link-btn:hover {
      border-color: var(--spark);
      color: var(--white);
    }

    .link-btn svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* ── Email ── */
    .rule {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.08), transparent);
      margin-bottom: .65rem;
    }

    .email-link {
      display: block;
      font-size: .62rem;
      letter-spacing: .07em;
      color: rgba(255,255,255,.18);
      text-decoration: none;
      transition: color .2s;
    }

    .email-link:hover { color: var(--spark); }

    /* ── Photo panel ── */
    .photo-side {
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Fade left edge into background */
    .photo-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, var(--ink) 0%, transparent 30%);
      z-index: 1;
      pointer-events: none;
    }

    /* Subtle bottom fade */
    .photo-side::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, var(--ink), transparent);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,.05);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 52px;
    }

    .footer-mark {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: .75rem;
      letter-spacing: -.01em;
      color: rgba(255,255,255,.12);
      text-decoration: none;
    }

    .footer-copy {
      font-size: .58rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.08);
    }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 52vw;
        min-height: auto;
      }

      .content {
        padding: 3.5rem 2rem 2.5rem;
        place-items: start;
      }

      .photo-side::before {
        background: linear-gradient(to bottom, transparent 50%, var(--ink) 100%);
      }

      .photo-side::after { display: none; }

      footer { flex-direction: column; gap: .35rem; height: auto; padding: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

<main>

  <!-- ── Text ── -->
  <div class="content">
    <div class="card">

      <img class="logo"
           src="images/dpnation-logo.png"
           alt="dpnation">

      <h1 class="tagline">
        it's more than a look,<br>it's a <em>lifestyle</em>
      </h1>

      <p class="bio">
        web development &middot; product marketing<br>
        software testing &middot; brand management
      </p>

      <div class="links">
        <a class="link-btn" href="https://github.com/dpnation" target="_blank" rel="noopener noreferrer">

            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

          LinkedIn
        </a>
      </div>

      <div class="rule"></div>
      <a class="email-link" href="mailto:dp@dpnation.com">dp@dpnation.com</a>

    </div>
  </div>

  <!-- ── Photo ── -->
  <div class="photo-side">
    <img src="images/0544-crop.jpg" alt="">
  </div>

</main>

<footer>
  <a class="footer-mark" href="/">dpnation</a>
  <span class="footer-copy">© 2025</span>
</footer>

</body>
</html>
